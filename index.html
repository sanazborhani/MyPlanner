<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Daily Planner Dashboard</title>
    <style>
        :root { 
            --stv-blue: #005a8b; 
            --bg-color: #f0f2f5; /* Minimalist soft gray-white */
            --container-bg: #f0f2f5;
            --grad-todo: linear-gradient(145deg, #e1f5fe, #b3e5fc);
            --grad-reminders: linear-gradient(145deg, #e8f5e9, #c8e6c9);
            --grad-meetings: linear-gradient(145deg, #f3e5f5, #e1bee7);
            --grad-gratitude: linear-gradient(145deg, #f0fdf4, #dcfce7);
            --grad-priorities: linear-gradient(145deg, #ffebee, #ffcdd2);
            --grad-nourish: linear-gradient(145deg, #fff9db, #fff3bf);
            --grad-followup: linear-gradient(145deg, #fff3e0, #ffe0b2);
            --grad-emails: linear-gradient(145deg, #e0f2f1, #b2dfdb);
            --grad-calls: linear-gradient(145deg, #fffde7, #fff9c4);
            
            /* Enhanced 3D shadows for the lighter background */
            --box-shadow-3d: 6px 6px 12px #d1d9e6, -6px -6px 12px #ffffff;
            --inner-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
        }
        
        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-color); 
            padding: 20px; 
            color: #444; 
        }

        .container { 
            max-width: 1150px; 
            margin: auto; 
            background: var(--container-bg); 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 20px 20px 60px #cfd8e3, -20px -20px 60px #ffffff;
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            border-bottom: 4px solid var(--stv-blue); 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }

        .header h1 { margin: 0; color: var(--stv-blue); font-size: 32px; font-weight: 800; letter-spacing: -1px; }

        .trackers-group { display: flex; align-items: center; gap: 30px; padding-bottom: 5px; }
        
        .mood-tracker span, .weather-selector span {
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            opacity: 0.5; 
        }

        .mood-tracker span:hover, .mood-tracker span.selected,
        .weather-selector span:hover, .weather-selector span.selected {
            opacity: 1;
            transform: scale(1.3) translateY(-2px);
            text-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .box { 
            border-radius: 20px; 
            padding: 25px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--box-shadow-3d);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .box:hover { transform: translateY(-3px); }

        .box h3 { 
            margin-top: 0; font-size: 0.85rem; text-transform: uppercase; 
            letter-spacing: 1px; color: var(--stv-blue);
            border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 8px; margin-bottom: 15px;
        }

        .split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; grid-column: 1 / -1; }
        .split-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 25px; grid-column: 1 / -1; }

        textarea { 
            width: 100%; border: none; outline: none; font-family: inherit; 
            font-size: 15px; background: rgba(255,255,255,0.3); 
            border-radius: 12px; padding: 15px; box-sizing: border-box;
            box-shadow: var(--inner-shadow);
            min-height: 120px; 
            resize: none;
        }

        .reminder-box textarea, .todo-height textarea { min-height: 280px; }

        .schedule-input { 
            width: 100%; border: none; outline: none; font-family: inherit; 
            font-size: 14px; background: transparent; padding: 5px;
        }

        .schedule-box { grid-row: span 2; background: var(--container-bg) !important; }
        .schedule-row { 
            display: flex; align-items: center; padding: 8px; margin-bottom: 8px; 
            border-radius: 10px; background: var(--container-bg); 
            box-shadow: inset 3px 3px 6px #d1d9e6, inset -3px -3px 6px #ffffff; 
        }
        
        #priorities { background: var(--grad-priorities); }
        #todo-box { background: var(--grad-todo); }
        .reminder-box { background: var(--grad-reminders); }
        #gratitude { background: var(--grad-gratitude); }
        #nourish { background: var(--grad-nourish); }

        .controls { margin-top: 40px; display: flex; gap: 20px; justify-content: center; }
        button { 
            padding: 12px 35px; border: none; border-radius: 12px; cursor: pointer; 
            font-weight: 700; box-shadow: var(--box-shadow-3d); transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .save-btn { background: var(--stv-blue); color: white; }
        .pdf-btn { background: #fff; color: #444; }
        button:active { transform: scale(0.98); box-shadow: inset 2px 2px 5px #babecc; }

        @media print { .controls { display: none !important; } body { background: white; } .container { box-shadow: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display: flex; align-items: baseline; gap: 15px;">
            <h1 id="plannerTitle">☀️ Daily Planner</h1>
            <div class="date-display" style="display: flex; gap: 8px; font-weight: bold; align-items: baseline;">
                <div id="currentDay">Friday</div>
                <div id="currentDate" style="color: var(--stv-blue);">March 6, 2026</div>
            </div>
        </div>

        <div class="trackers-group">
            <div class="mood-tracker" id="moodTracker">
                <span data-m="😔">😔</span><span data-m="😐">😐</span><span data-m="😊">😊</span><span data-m="🤩">🤩</span><span data-m="💪">💪</span>
            </div>
            <div class="weather-selector" id="weather">
                <span data-w="☀️">☀️</span><span data-w="🌤️">🌤️</span><span data-w="☁️">☁️</span><span data-w="🌧️">🌧️</span><span data-w="❄️">❄️</span>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="box schedule-box">
            <h3>⏰ Hourly Schedule</h3>
            <div id="scheduleContainer"></div>
        </div>

        <div class="box" id="priorities">
            <h3>🎯 Top 3 Priorities</h3>
            <textarea id="val-priorities" oninput="autoExpand(this)" placeholder="Focus on..."></textarea>
        </div>

        <div class="box todo-height" id="todo-box">
            <h3>🤝 Meetings & Notes</h3>
            <textarea id="val-todo" oninput="autoExpand(this)" placeholder="Discussion points..."></textarea>
        </div>

        <div class="split-2">
            <div class="box reminder-box">
                <h3>🛡️ Reminders</h3>
                <textarea id="val-reminders" oninput="autoExpand(this)" placeholder="Standards..."></textarea>
            </div>
            <div class="box todo-height" style="background: var(--grad-meetings);">
                <h3>📝 To Do List</h3>
                <textarea id="val-meetings" oninput="autoExpand(this)" placeholder="Specific tasks..."></textarea>
            </div>
        </div>

        <div class="split-3">
            <div class="box" style="background: var(--grad-followup);">
                <h3>📞 Follow Up</h3>
                <textarea id="val-followup" oninput="autoExpand(this)" placeholder="Reach out..."></textarea>
            </div>
            <div class="box" style="background: var(--grad-emails);">
                <h3>📧 Emails</h3>
                <textarea id="val-emails" oninput="autoExpand(this)" placeholder="Inbox..."></textarea>
            </div>
            <div class="box" style="background: var(--grad-calls);">
                <h3>📱 Calls</h3>
                <textarea id="val-calls" oninput="autoExpand(this)" placeholder="Syncs..."></textarea>
            </div>
        </div>

        <div class="box" id="nourish">
            <h3>🍲 Nourishment Plan</h3>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <input type="text" id="mealB" class="schedule-input" style="border-bottom:1px solid #ccc" placeholder="B-FAST...">
                <input type="text" id="mealL" class="schedule-input" style="border-bottom:1px solid #ccc" placeholder="LUNCH...">
                <input type="text" id="mealD" class="schedule-input" placeholder="DINNER...">
            </div>
        </div>

        <div class="box" id="gratitude">
            <h3>🌿 I Am Grateful For</h3>
            <textarea id="val-gratitude" oninput="autoExpand(this)" placeholder="Today I am thankful for..."></textarea>
        </div>
    </div>

    <div class="controls">
        <button class="save-btn" onclick="saveData()">💾 Save Progress</button>
        <button class="pdf-btn" onclick="exportPDF()">📄 Export PDF</button>
    </div>
</div>

<script>
    const times = ["06:30", "07:30", "08:30", "09:30", "10:30", "11:30", "12:00", "13:30", "14:30", "15:30", "17:00", "18:30", "20:00", "21:30"];
    const scheduleContainer = document.getElementById('scheduleContainer');

    times.forEach(t => {
        const row = document.createElement('div');
        row.className = 'schedule-row';
        row.innerHTML = `<div style="width:60px; font-weight:bold; color:var(--stv-blue); font-size:11px;">${t}</div><input type="text" id="task-${t}" class="schedule-input" placeholder="...">`;
        scheduleContainer.appendChild(row);
    });

    async function autoWeather() {
        try {
            const locRes = await fetch('https://ipapi.co/json/');
            const { latitude, longitude, city } = await locRes.json();
            const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&temperature_unit=fahrenheit`);
            const { current_weather } = await wRes.json();
            const codeMap = { 0: "☀️", 1: "🌤️", 2: "🌤️", 3: "☁️", 45: "☁️", 61: "🌧️", 80: "🌧️", 71: "❄️" };
            const emoji = codeMap[current_weather.weathercode] || "☀️";
            const temp = Math.round(current_weather.temperature);
            
            document.querySelectorAll('.weather-selector span').forEach(s => s.classList.toggle('selected', s.dataset.w === emoji));
            document.getElementById('plannerTitle').innerHTML = `${emoji} Daily Planner <span style="font-size:14px; font-weight:400; color:#777;">(${city}: ${temp}°F)</span>`;
        } catch (e) { console.log(e); }
    }

    document.getElementById('moodTracker').addEventListener('click', (e) => {
        if(e.target.dataset.m) {
            document.querySelectorAll('#moodTracker span').forEach(s => s.classList.remove('selected'));
            e.target.classList.add('selected');
            localStorage.setItem('sanaz_mood', e.target.dataset.m);
        }
    });

    document.getElementById('weather').addEventListener('click', (e) => {
        if(e.target.dataset.w) {
            document.querySelectorAll('.weather-selector span').forEach(s => s.classList.remove('selected'));
            e.target.classList.add('selected');
            localStorage.setItem('sanaz_weather', e.target.dataset.w);
        }
    });

    function autoExpand(field) { 
        field.style.height = 'inherit'; 
        field.style.height = (field.scrollHeight) + 'px'; 
    }

    function saveData() {
        const data = {};
        document.querySelectorAll('textarea, input').forEach(el => { if(el.id) data[el.id] = el.value; });
        localStorage.setItem('sanaz_daily_planner_vfinal', JSON.stringify(data));
        alert("Planner Saved!");
    }

    function exportPDF() { window.print(); }

    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('sanaz_daily_planner_vfinal'));
        if (saved) { 
            Object.keys(saved).forEach(key => { 
                const el = document.getElementById(key); 
                if (el) { el.value = saved[key]; if(el.tagName === 'TEXTAREA') autoExpand(el); }
            }); 
        }
        const m = localStorage.getItem('sanaz_mood');
        if(m) { const s = document.querySelector(`[data-m="${m}"]`); if(s) s.classList.add('selected'); }
        const w = localStorage.getItem('sanaz_weather');
        if(w) { const s = document.querySelector(`[data-w="${w}"]`); if(s) s.classList.add('selected'); }
        else autoWeather();
    };
</script>
</body>
</html>
