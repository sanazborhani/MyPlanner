<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Daily Planner</title>
    <style>
        :root { 
            --stv-blue: #005a8b; 
            --bg-color: #f0f2f5; 
            --container-bg: #f0f2f5;
            --grad-todo: linear-gradient(145deg, #e1f5fe, #b3e5fc);
            --grad-reminders: linear-gradient(145deg, #e8f5e9, #c8e6c9);
            --grad-meetings: linear-gradient(145deg, #f3e5f5, #e1bee7);
            --grad-gratitude: linear-gradient(145deg, #f0fdf4, #dcfce7);
            --grad-priorities: linear-gradient(145deg, #ffebee, #ffcdd2);
            --grad-nourish: linear-gradient(145deg, #fff9db, #fff3bf);
            --grad-followup: linear-gradient(145deg, #fff3e0, #ffe0b2);
            --grad-emails: linear-gradient(145deg, #e0f2f1, #b2dfdb);
            --grad-calls: linear-gradient(145deg, #fffde7, #fff9c4);
            
            --box-shadow-3d: 6px 6px 12px #d1d9e6, -6px -6px 12px #ffffff;
            --inner-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
        }
        
        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-color); 
            padding: 20px; 
            color: #444; 
        }

        .container { 
            max-width: 1150px; 
            margin: auto; 
            background: var(--container-bg); 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 20px 20px 60px #cfd8e3, -20px -20px 60px #ffffff;
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            border-bottom: 4px solid var(--stv-blue); 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }

        .header h1 { margin: 0; color: var(--stv-blue); font-size: 32px; font-weight: 800; letter-spacing: -1px; }

        .trackers-group { display: flex; align-items: center; gap: 30px; padding-bottom: 5px; }
        
        .mood-tracker span, .weather-selector span {
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            opacity: 0.6; 
        }

        .mood-tracker span:hover, .mood-tracker span.selected,
        .weather-selector span:hover, .weather-selector span.selected {
            opacity: 1;
            font-weight: 800;
            transform: scale(1.3) translateY(-2px);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .box { 
            border-radius: 20px; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--box-shadow-3d);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .box h3 { 
            margin-top: 0; font-size: 0.85rem; text-transform: uppercase; 
            letter-spacing: 1px; color: var(--stv-blue);
            border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 8px; margin-bottom: 15px;
        }

        .split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; grid-column: 1 / -1; }
        .split-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 25px; grid-column: 1 / -1; }

        textarea { 
            width: 100%; border: none; outline: none; font-family: inherit; 
            font-size: 15px; background: rgba(255,255,255,0.3); 
            border-radius: 12px; padding: 15px; box-sizing: border-box;
            box-shadow: var(--inner-shadow);
            flex-grow: 1; 
            resize: none;
            line-height: 1.6;
        }

        .checklist-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .checklist-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--stv-blue); }
        .checklist-item input[type="text"] { 
            flex: 1; border: none; outline: none; background: rgba(255,255,255,0.3); 
            padding: 8px 12px; border-radius: 10px; font-family: inherit; font-size: 15px;
            box-shadow: var(--inner-shadow);
        }

        .box-tall { min-height: 280px; }
        .split-3 textarea { min-height: 150px; }

        .schedule-input { 
            width: 100%; border: none; outline: none; font-family: inherit; 
            font-size: 14px; background: transparent; padding: 5px;
        }

        .schedule-box { grid-row: span 2; background: var(--container-bg) !important; }
        .schedule-row { 
            display: flex; align-items: center; padding: 8px; margin-bottom: 8px; 
            border-radius: 10px; background: var(--container-bg); 
            box-shadow: inset 3px 3px 6px #d1d9e6, inset -3px -3px 6px #ffffff; 
            transition: 0.3s;
        }
        
        .current-hour { border: 2px solid var(--stv-blue); box-shadow: 0 0 10px rgba(0,90,139,0.3); transform: scale(1.02); }

        #priorities { background: var(--grad-priorities); }
        #reminders-box { background: var(--grad-todo); }
        #meetings-notes-box { background: var(--grad-reminders); }
        #gratitude { background: var(--grad-gratitude); }
        #nourish { background: var(--grad-nourish); }

        .controls { margin-top: 40px; display: flex; gap: 20px; justify-content: center; }
        button { 
            padding: 12px 35px; border: none; border-radius: 12px; cursor: pointer; 
            font-weight: 700; box-shadow: var(--box-shadow-3d); transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .save-btn { background: var(--stv-blue); color: white; }
        .pdf-btn { background: #28a745; color: white; }
        button:active { transform: scale(0.98); }

        @media print { .controls { display: none !important; } body { background: white; } .container { box-shadow: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display: flex; align-items: baseline; gap: 15px;">
            <h1 id="plannerTitle"><span id="autoEmoji">☀️</span> Daily Planner</h1>
            <div class="date-display" style="display: flex; gap: 8px; font-weight: bold; align-items: baseline;">
                <div id="currentDay"></div>
                <div id="currentDate" style="color: var(--stv-blue);"></div>
            </div>
        </div>

        <div class="trackers-group">
            <div class="mood-tracker" id="moodTracker">
                <span data-m="😔">😔</span><span data-m="😐">😐</span><span data-m="😊">😊</span><span data-m="🤩">🤩</span><span data-m="💪">💪</span>
            </div>
            <div class="weather-selector" id="weather">
                <span data-w="☀️">☀️</span><span data-w="🌤️">🌤️</span><span data-w="☁️">☁️</span><span data-w="🌧️">🌧️</span><span data-w="❄️">❄️</span>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="box schedule-box">
            <h3>⏰ Hourly Schedule</h3>
            <div id="scheduleContainer"></div>
        </div>

        <div class="box" id="priorities">
            <h3>🎯 Top Priorities</h3>
            <div id="prioritiesList"></div>
        </div>

        <div class="box" id="reminders-box">
            <h3>🛡️ Reminders</h3>
            <textarea id="val-reminders" placeholder="Key standards or reminders..."></textarea>
        </div>

        <div class="split-2">
            <div class="box box-tall" id="meetings-notes-box">
                <h3>🤝 Meetings & Notes</h3>
                <div id="meetingsNotesList"></div>
            </div>
            <div class="box box-tall" style="background: var(--grad-meetings);">
                <h3>📝 To Do List</h3>
                <div id="todoList"></div>
            </div>
        </div>

        <div class="split-3">
            <div class="box" style="background: var(--grad-followup);">
                <h3>📞 Follow Up</h3>
                <textarea id="val-followup" placeholder="Reach out..."></textarea>
            </div>
            <div class="box" style="background: var(--grad-emails);">
                <h3>📧 Emails</h3>
                <textarea id="val-emails" placeholder="Inbox..."></textarea>
            </div>
            <div class="box" style="background: var(--grad-calls);">
                <h3>📱 Calls</h3>
                <textarea id="val-calls" placeholder="Syncs..."></textarea>
            </div>
        </div>

        <div class="box" id="nourish">
            <h3>🍲 Nourishment Plan</h3>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <input type="text" id="mealB" class="schedule-input" style="border-bottom:1px solid #ccc" placeholder="B-FAST...">
                <input type="text" id="mealL" class="schedule-input" style="border-bottom:1px solid #ccc" placeholder="LUNCH...">
                <input type="text" id="mealD" class="schedule-input" placeholder="DINNER...">
            </div>
        </div>

        <div class="box" id="gratitude">
            <h3>🌿 I Am Grateful For</h3>
            <textarea id="val-gratitude" placeholder="Today I am thankful for..."></textarea>
        </div>
    </div>

    <div class="controls">
        <button class="save-btn" onclick="saveData()">💾 Save Progress</button>
        <button class="pdf-btn" onclick="exportPDF()">📄 Export PDF</button>
    </div>
</div>

<script>
    const times = ["06:30", "07:30", "08:30", "09:30", "10:30", "11:30", "12:00", "13:30", "14:30", "15:30", "17:00", "18:30", "20:00", "21:30
