<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Daily Planner</title>
    <style>
        :root { 
            --stv-blue: #005a8b; 
            --bg-color: #f0f2f5; 
            --container-bg: #f0f2f5;
            --grad-todo: linear-gradient(145deg, #e1f5fe, #b3e5fc);
            --grad-reminders: linear-gradient(145deg, #e8f5e9, #c8e6c9);
            --grad-meetings: linear-gradient(145deg, #f3e5f5, #e1bee7);
            --grad-gratitude: linear-gradient(145deg, #f0fdf4, #dcfce7);
            --grad-priorities: linear-gradient(145deg, #ffebee, #ffcdd2);
            --grad-nourish: linear-gradient(145deg, #fff9db, #fff3bf);
            --grad-followup: linear-gradient(145deg, #fff3e0, #ffe0b2);
            --grad-emails: linear-gradient(145deg, #e0f2f1, #b2dfdb);
            --grad-calls: linear-gradient(145deg, #fffde7, #fff9c4);
            --box-shadow-3d: 6px 6px 12px #d1d9e6, -6px -6px 12px #ffffff;
            --inner-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
        }
        
        body { font-family: 'SF Pro Display', sans-serif; background: var(--bg-color); padding: 20px; color: #444; }

        .container { 
            max-width: 1150px; margin: auto; background: var(--container-bg); 
            padding: 40px; border-radius: 30px; box-shadow: 20px 20px 60px #cfd8e3, -20px -20px 60px #ffffff;
        }
        
        .header { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            border-bottom: 4px solid var(--stv-blue); padding-bottom: 15px; margin-bottom: 25px; 
        }

        .header h1 { margin: 0; color: var(--stv-blue); font-size: 32px; font-weight: 800; }

        .trackers-group { display: flex; align-items: center; gap: 30px; }
        
        .mood-tracker span, .weather-selector span { font-size: 24px; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .mood-tracker span:hover, .mood-tracker span.selected,
        .weather-selector span:hover, .weather-selector span.selected { opacity: 1; transform: scale(1.2); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .box { 
            border-radius: 20px; padding: 25px; display: flex; flex-direction: column; 
            box-shadow: var(--box-shadow-3d); border: 1px solid rgba(255,255,255,0.6);
        }

        .box h3 { 
            margin: 0 0 15px 0; font-size: 0.85rem; text-transform: uppercase; 
            color: var(--stv-blue); border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 8px;
        }

        .split-2, .split-3 { display: grid; gap: 25px; grid-column: 1 / -1; }
        .split-2 { grid-template-columns: 1fr 1fr; }
        .split-3 { grid-template-columns: 1fr 1fr 1fr; }

        textarea { 
            width: 100%; border: none; outline: none; font-family: inherit; font-size: 15px; 
            background: rgba(255,255,255,0.3); border-radius: 12px; padding: 15px; box-sizing: border-box;
            box-shadow: var(--inner-shadow); flex-grow: 1; resize: none;
        }

        .checklist-item { display: flex; align-items: center; gap: 10px; }
        .checklist-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--stv-blue); }
        .checklist-item input[type="text"] { 
            flex: 1; border: none; outline: none; background: rgba(255,255,255,0.3); 
            padding: 8px 12px; border-radius: 10px; box-shadow: var(--inner-shadow);
        }

        /* Forces priorities to fill box without bottom gaps */
        #prioritiesList { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }

        .schedule-box { grid-row: span 2; background: var(--container-bg) !important; }
        .schedule-row { 
            display: flex; align-items: center; padding: 8px; margin-bottom: 8px; 
            border-radius: 10px; box-shadow: inset 3px 3px 6px #d1d9e6, inset -3px -3px 6px #ffffff; 
        }
        
        .current-hour { border: 2px solid var(--stv-blue); }

        #priorities { background: var(--grad-priorities); }
        #reminders-box { background: var(--grad-todo); }
        #nourish { background: var(--grad-nourish); }

        .nourish-row { display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.1); padding: 5px 0; }
        .nourish-label { font-size: 11px; font-weight: 800; color: var(--stv-blue); width: 65px; }

        .controls { margin-top: 40px; display: flex; gap: 20px; justify-content: center; }
        button { padding: 12px 35px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; }
        .save-btn { background: var(--stv-blue); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1><span id="autoEmoji">☀️</span> Daily Planner</h1>
            <span id="weatherText" style="font-size: 14px; color: #777;">Locating...</span>
            <div id="dateDisplay" style="font-weight: bold; color: var(--stv-blue); margin-top: 5px;"></div>
        </div>
        <div class="trackers-group">
            <div class="mood-tracker" id="moodTracker">
                <span data-m="😔">😔</span><span data-m="😐">😐</span><span data-m="😊">😊</span><span data-m="🤩">🤩</span><span data-m="💪">💪</span>
            </div>
            <div class="weather-selector" id="weather">
                <span data-w="☀️">☀️</span><span data-w="🌤️">🌤️</span><span data-w="☁️">☁️</span><span data-w="🌧️">🌧️</span><span data-w="❄️">❄️</span>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="box schedule-box">
            <h3>⏰ Hourly Schedule</h3>
            <div id="schCont"></div>
        </div>
        <div class="box" id="priorities">
            <h3>🎯 Top Priorities</h3>
            <div id="prioritiesList"></div>
        </div>
        <div class="box" id="reminders-box">
            <h3>🛡️ Reminders</h3>
            <textarea id="val-reminders" placeholder="Key standards..."></textarea>
        </div>
        </div>

    <div class="controls">
        <button class="save-btn" onclick="saveData()">💾 Save Progress</button>
    </div>
</div>

<script>
    const times = ["06:30", "07:30", "08:30", "09:30", "10:30", "11:30", "12:00", "13:30", "14:30", "15:30", "17:00", "18:30", "20:00", "21:30"];
    
    // Build Schedule
    times.forEach(t => {
        document.getElementById('schCont').innerHTML += `<div class="schedule-row" id="r-${t.replace(':','')}"><div style="width:50px; font-size:11px;">${t}</div><input type="text" class="schedule-input" style="width:100%; background:none; border:none; outline:none;"></div>`;
    });

    // Build Priorities (9 items)
    for(let i=1; i<=9; i++) {
        document.getElementById('prioritiesList').innerHTML += `<div class="checklist-item"><input type="checkbox"><input type="text" placeholder="..."></div>`;
    }

    function updateDate() {
        const d = new Date();
        document.getElementById('dateDisplay').innerText = d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }

    async function getWeather() {
        const wTxt = document.getElementById('weatherText');
        try {
            // Get location via IP lookup as a primary fallback
            const loc = await fetch('https://ipapi.co/json/').then(r => r.json());
            const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current_weather=true&temperature_unit=fahrenheit`).then(r => r.json());
            const temp = Math.round(w.current_weather.temperature);
            wTxt.innerText = `(${loc.city}: ${temp}°F)`;
        } catch (e) {
            wTxt.innerText = "(Weather unavailable)";
        }
    }

    function saveData() {
        const data = Array.from(document.querySelectorAll('input, textarea')).map(el => el.value);
        localStorage.setItem('sanaz_planner', JSON.stringify(data));
        alert('Saved!');
    }

    window.onload = () => { updateDate(); getWeather(); };
</script>
</body>
</html>
