<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner</title>
    <style>
        :root { 
            --stv-blue: #005a8b; 
            --bg-color: #f0f2f5; 
            --container-bg: #f0f2f5;
            --grad-todo: linear-gradient(145deg, #e1f5fe, #b3e5fc);
            --grad-reminders: linear-gradient(145deg, #e8f5e9, #c8e6c9);
            --grad-meetings: linear-gradient(145deg, #f3e5f5, #e1bee7);
            --grad-gratitude: linear-gradient(145deg, #f0fdf4, #dcfce7);
            --grad-priorities: linear-gradient(145deg, #ffebee, #ffcdd2);
            --grad-nourish: linear-gradient(145deg, #fff9db, #fff3bf);
            --grad-followup: linear-gradient(145deg, #fff3e0, #ffe0b2);
            --grad-emails: linear-gradient(145deg, #e0f2f1, #b2dfdb);
            --grad-calls: linear-gradient(145deg, #fffde7, #fff9c4);
            
            --box-shadow-3d: 6px 6px 12px #d1d9e6, -6px -6px 12px #ffffff;
            --inner-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
        }
        
        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-color); 
            padding: 20px; 
            color: #444; 
        }

        .container { 
            max-width: 1150px; 
            margin: auto; 
            background: var(--container-bg); 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 20px 20px 60px #cfd8e3, -20px -20px 60px #ffffff;
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            border-bottom: 4px solid var(--stv-blue); 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }

        .header h1 { margin: 0; color: var(--stv-blue); font-size: 32px; font-weight: 800; letter-spacing: -1px; }

        .date-display { display: flex; gap: 8px; font-weight: bold; align-items: baseline; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .box { 
            border-radius: 20px; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            transition: 0.4s;
            box-shadow: var(--box-shadow-3d);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .box h3 { 
            margin-top: 0; font-size: 0.85rem; text-transform: uppercase; 
            letter-spacing: 1px; color: var(--stv-blue);
            border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 8px; margin-bottom: 15px;
        }

        /* Checklist Items */
        .checklist-container { display: flex; flex-direction: column; gap: 8px; }
        .checklist-line { display: flex; align-items: center; gap: 10px; }
        .checklist-line input[type="checkbox"] { 
            width: 18px; height: 18px; cursor: pointer; accent-color: var(--stv-blue);
        }
        .checklist-line input[type="text"] { 
            flex-grow: 1; border: none; outline: none; background: rgba(255,255,255,0.4);
            padding: 8px 12px; border-radius: 8px; box-shadow: var(--inner-shadow);
            font-family: inherit; font-size: 14px;
        }

        textarea { 
            width: 100%; border: none; outline: none; font-family: inherit; 
            font-size: 15px; background: rgba(255,255,255,0.3); 
            border-radius: 12px; padding: 15px; box-sizing: border-box;
            box-shadow: var(--inner-shadow);
            flex-grow: 1; resize: none; line-height: 1.6;
        }

        .split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; grid-column: 1 / -1; }
        .split-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 25px; grid-column: 1 / -1; }

        .schedule-row { 
            display: flex; align-items: center; padding: 8px; margin-bottom: 8px; 
            border-radius: 10px; background: var(--container-bg); 
            box-shadow: inset 3px 3px 6px #d1d9e6, inset -3px -3px 6px #ffffff; 
        }

        .current-hour { border: 2px solid var(--stv-blue); transform: scale(1.02); }

        .controls { margin-top: 40px; display: flex; gap: 20px; justify-content: center; }
        button { padding: 12px 35px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; box-shadow: var(--box-shadow-3d); }
        .save-btn { background: var(--stv-blue); color: white; }
        .pdf-btn { background: #28a745; color: white; }

        @media print { .controls { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display: flex; align-items: baseline; gap: 15px;">
            <h1 id="plannerTitle">☀️ Daily Planner</h1>
            <div class="date-display">
                <div id="currentDay"></div>
                <div id="currentDate" style="color: var(--stv-blue);"></div>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="box" style="grid-row: span 2;">
            <h3>⏰ Hourly Schedule</h3>
            <div id="scheduleContainer"></div>
        </div>

        <div class="box" id="priorities" style="background: var(--grad-priorities);">
            <h3>🎯 Top 3 Priorities</h3>
            <div class="checklist-container" id="prioritiesContainer"></div>
        </div>

        <div class="box" id="todo-box" style="background: var(--grad-todo);">
            <h3>🤝 Meetings & Notes</h3>
            <textarea id="val-todo" placeholder="Notes..."></textarea>
        </div>

        <div class="split-2">
            <div class="box" style="background: var(--grad-reminders);">
                <h3>🛡️ Reminders</h3>
                <textarea id="val-reminders" placeholder="Standards..."></textarea>
            </div>
            <div class="box" style="background: var(--grad-meetings);">
                <h3>📝 To Do List</h3>
                <div class="checklist-container" id="todoListContainer"></div>
            </div>
        </div>

        <div class="split-3">
            <div class="box" style="background: var(--grad-followup);"><h3>📞 Follow Up</h3><textarea id="val-followup"></textarea></div>
            <div class="box" style="background: var(--grad-emails);"><h3>📧 Emails</h3><textarea id="val-emails"></textarea></div>
            <div class="box" style="background: var(--grad-calls);"><h3>📱 Calls</h3><textarea id="val-calls"></textarea></div>
        </div>

        <div class="box" id="nourish" style="background: var(--grad-nourish);">
            <h3>🍲 Nourishment</h3>
            <textarea id="val-nourish" placeholder="B / L / D..."></textarea>
        </div>

        <div class="box" id="gratitude" style="background: var(--grad-gratitude);">
            <h3>🌿 Gratitude</h3>
            <textarea id="val-gratitude"></textarea>
        </div>
    </div>

    <div class="controls">
        <button class="save-btn" onclick="saveData()">💾 Save Progress</button>
        <button class="pdf-btn" onclick="window.print()">📄 Export PDF</button>
    </div>
</div>

<script>
    const times = ["06:30", "07:30", "08:30", "09:30", "10:30", "11:30", "12:00", "13:30", "14:30", "15:30", "17:00", "18:30", "20:00", "21:30"];
    
    // Auto-generate Schedule
    const schCont = document.getElementById('scheduleContainer');
    times.forEach(t => {
        schCont.innerHTML += `<div class="schedule-row" id="row-${t.replace(':','')}"><div style="width:50px; font-weight:bold; font-size:11px;">${t}</div><input type="text" id="task-${t}" style="flex:1; border:none; background:transparent; outline:none;"></div>`;
    });

    // Auto-generate Priorities (3 lines)
    const priCont = document.getElementById('prioritiesContainer');
    for(let i=1; i<=3; i++) {
        priCont.innerHTML += `<div class="checklist-line"><input type="checkbox" id="prio-ch-${i}"><input type="text" id="prio-txt-${i}" placeholder="Priority ${i}"></div>`;
    }

    // Auto-generate To-Do List (10 lines)
    const todoCont = document.getElementById('todoListContainer');
    for(let i=1; i<=10; i++) {
        todoCont.innerHTML += `<div class="checklist-line"><input type="checkbox" id="todo-ch-${i}"><input type="text" id="todo-txt-${i}" placeholder="Task ${i}"></div>`;
    }

    function updateDate() {
        const now = new Date();
        const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        document.getElementById('currentDay').innerText = days[now.getDay()];
        document.getElementById('currentDate').innerText = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    }

    function saveData() {
        const data = {};
        document.querySelectorAll('input, textarea').forEach(el => {
            if(el.id) data[el.id] = el.type === 'checkbox' ? el.checked : el.value;
        });
        localStorage.setItem('sanaz_planner_v3', JSON.stringify(data));
        alert("Progress Saved!");
    }

    function loadData() {
        const saved = JSON.parse(localStorage.getItem('sanaz_planner_v3'));
        if(saved) {
            Object.keys(saved).forEach(key => {
                const el = document.getElementById(key);
                if(el) {
                    if(el.type === 'checkbox') el.checked = saved[key];
                    else el.value = saved[key];
                }
            });
        }
    }

    function highlightTime() {
        const now = new Date();
        const cur = now.getHours() * 60 + now.getMinutes();
        document.querySelectorAll('.schedule-row').forEach(r => r.classList.remove('current-hour'));
        for(let i=0; i<times.length; i++) {
            const [h, m] = times[i].split(':').map(Number);
            const slot = h * 60 + m;
            const next = times[i+1] ? (times[i+1].split(':').map(Number)[0]*60 + times[i+1].split(':').map(Number)[1]) : 1440;
            if(cur >= slot && cur < next) {
                document.getElementById(`row-${times[i].replace(':','')}`).classList.add('current-hour');
                break;
            }
        }
    }

    window.onload = () => { updateDate(); loadData(); highlightTime(); setInterval(highlightTime, 60000); };
</script>
</body>
</html>
