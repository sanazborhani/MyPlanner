<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Daily Planner</title>
    <style>
        :root { 
            --stv-blue: #005a8b; 
            --bg-color: #f0f2f5; 
            --container-bg: #f0f2f5;
            --grad-todo: linear-gradient(145deg, #e1f5fe, #b3e5fc);
            --grad-reminders: linear-gradient(145deg, #e8f5e9, #c8e6c9);
            --grad-meetings: linear-gradient(145deg, #f3e5f5, #e1bee7);
            --grad-gratitude: linear-gradient(145deg, #f0fdf4, #dcfce7);
            --grad-priorities: linear-gradient(145deg, #ffebee, #ffcdd2);
            --grad-nourish: linear-gradient(145deg, #fff9db, #fff3bf);
            --grad-followup: linear-gradient(145deg, #fff3e0, #ffe0b2);
            --grad-emails: linear-gradient(145deg, #e0f2f1, #b2dfdb);
            --grad-calls: linear-gradient(145deg, #fffde7, #fff9c4);
            
            --box-shadow-3d: 6px 6px 12px #d1d9e6, -6px -6px 12px #ffffff;
            --inner-shadow: inset 2px 2px 5px rgba(0,0,0,0.05);
        }
        
        body { 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-color); 
            padding: 20px; 
            color: #444; 
        }

        .container { 
            max-width: 1150px; 
            margin: auto; 
            background: var(--container-bg); 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 20px 20px 60px #cfd8e3, -20px -20px 60px #ffffff;
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            border-bottom: 4px solid var(--stv-blue); 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }

        .header h1 { margin: 0; color: var(--stv-blue); font-size: 32px; font-weight: 800; letter-spacing: -1px; }

        .trackers-group { display: flex; align-items: center; gap: 30px; padding-bottom: 5px; }
        
        .mood-tracker span, .weather-selector span {
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-block;
            opacity: 0.6; 
        }

        .mood-tracker span:hover, .mood-tracker span.selected,
        .weather-selector span:hover, .weather-selector span.selected {
            opacity: 1;
            transform: scale(1.3) translateY(-2px);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .box { 
            border-radius: 20px; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            transition: 0.4s;
            box-shadow: var(--box-shadow-3d);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .box h3 { 
            margin-top: 0; font-size: 0.85rem; text-transform: uppercase; 
            letter-spacing: 1px; color: var(--stv-blue);
            border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 8px; margin-bottom: 15px;
        }

        .split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; grid-column: 1 / -1; }
        .split-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 25px; grid-column: 1 / -1; }

        textarea { 
            width: 100%; border: none; outline: none; font-family: inherit; 
            font-size: 15px; background: rgba(255,255,255,0.3); 
            border-radius: 12px; padding: 15px; box-sizing: border-box;
            box-shadow: var(--inner-shadow);
            flex-grow: 1; 
            resize: none;
            line-height: 1.6;
        }

        /* Checklist Row Style */
        .check-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .check-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--stv-blue); }
        .check-row input[type="text"] { 
            flex: 1; border: none; background: rgba(255,255,255,0.3); 
            border-radius: 8px; padding: 8px; font-family: inherit; 
            font-size: 14px; box-shadow: var(--inner-shadow); outline: none;
        }

        .reminder-box textarea { min-height: 280px; }
        .split-3 textarea { min-height: 150px; }

        .schedule-input { width: 100%; border: none; outline: none; font-family: inherit; font-size: 14px; background: transparent; padding: 5px; }
        .schedule-box { grid-row: span 2; background: var(--container-bg) !important; }
        .schedule-row { display: flex; align-items: center; padding: 8px; margin-bottom: 8px; border-radius: 10px; background: var(--container-bg); box-shadow: inset 3px 3px 6px #d1d9e6, inset -3px -3px 6px #ffffff; }
        .current-hour { border: 2px solid var(--stv-blue); box-shadow: 0 0 10px rgba(0,90,139,0.3); transform: scale(1.02); }

        .controls { margin-top: 40px; display: flex; gap: 20px; justify-content: center; }
        button { padding: 12px 35px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; box-shadow: var(--box-shadow-3d); transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .save-btn { background: var(--stv-blue); color: white; }
        .pdf-btn { background: #28a745; color: white; }

        @media print { .controls { display: none !important; } body { background: white; } .container { box-shadow: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="display: flex; align-items: baseline; gap: 15px;">
            <h1 id="plannerTitle"><span id="autoEmoji">☀️</span> Daily Planner</h1>
            <div class="date-display" style="display: flex; gap: 8px; font-weight: bold; align-items: baseline;">
                <div id="currentDay"></div>
                <div id="currentDate" style="color: var(--stv-blue);"></div>
            </div>
        </div>
        <div class="trackers-group">
            <div class="mood-tracker" id="moodTracker">
                <span data-m="😔">😔</span><span data-m="😐">😐</span><span data-m="😊">😊</span><span data-m="🤩">🤩</span><span data-m="💪">💪</span>
            </div>
            <div class="weather-selector" id="weather">
                <span data-w="☀️">☀️</span><span data-w="🌤️">🌤️</span><span data-w="☁️">☁️</span><span data-w="🌧️">🌧️</span><span data-w="❄️">❄️</span>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="box schedule-box">
            <h3>⏰ Hourly Schedule</h3>
            <div id="scheduleContainer"></div>
        </div>

        <div class="box" id="priorities" style="background: var(--grad-priorities);">
            <h3>🎯 Top 3 Priorities</h3>
            <div id="prioritiesContainer"></div>
        </div>

        <div class="box" id="todo-box" style="background: var(--grad-todo);">
            <h3>🤝 Meetings & Notes</h3>
            <textarea id="val-todo" placeholder="Discussion points..."></textarea>
        </div>

        <div class="split-2">
            <div class="box reminder-box" style="background: var(--grad-reminders);">
                <h3>🛡️ Reminders</h3>
                <textarea id="val-reminders" placeholder="Standards..."></textarea>
            </div>
            <div class="box todo-height-box" style="background: var(--grad-meetings);">
                <h3>📝 To Do List</h3>
                <div id="todoListContainer"></div>
            </div>
        </div>

        <div class="split-3">
            <div class="box" style="background: var(--grad-followup);"><h3>📞 Follow Up</h3><textarea id="val-followup"></textarea></div>
            <div class="box" style="background: var(--grad-emails);"><h3>📧 Emails</h3><textarea id="val-emails"></textarea></div>
            <div class="box" style="background: var(--grad-calls);"><h3>📱 Calls</h3><textarea id="val-calls"></textarea></div>
        </div>

        <div class="box" id="nourish" style="background: var(--grad-nourish);">
            <h3>🍲 Nourishment Plan</h3>
            <textarea id="val-nourish" style="min-height: 80px;" placeholder="B/L/D..."></textarea>
        </div>

        <div class="box" id="gratitude" style="background: var(--grad-gratitude);">
            <h3>🌿 I Am Grateful For</h3>
            <textarea id="val-gratitude" placeholder="Today I am thankful for..."></textarea>
        </div>
    </div>

    <div class="controls">
        <button class="save-btn" onclick="saveData()">💾 Save Progress</button>
        <button class="pdf-btn" onclick="window.print()">📄 Export PDF</button>
    </div>
</div>

<script>
    const times = ["06:30", "07:30", "08:30", "09:30", "10:30", "11:30", "12:00", "13:30", "14:30", "15:30", "17:00", "18:30", "20:00", "21:30"];
    
    // 1. Build Schedule
    const schCont = document.getElementById('scheduleContainer');
    times.forEach(t => {
        schCont.innerHTML += `<div class="schedule-row" id="row-${t.replace(':','')}"><div style="width:60px; font-weight:bold; color:var(--stv-blue); font-size:11px;">${t}</div><input type="text" id="task-${t}" class="schedule-input" placeholder="..."></div>`;
    });

    // 2. Build Priorities (3 rows)
    const prioCont = document.getElementById('prioritiesContainer');
    for(let i=1; i<=3; i++) {
        prioCont.innerHTML += `<div class="check-row"><input type="checkbox" id="p-ch-${i}"><input type="text" id="p-tx-${i}" placeholder="Priority ${i}"></div>`;
    }

    // 3. Build To Do List (10 rows)
    const listCont = document.getElementById('todoListContainer');
    for(let i=1; i<=10; i++) {
        listCont.innerHTML += `<div class="check-row"><input type="checkbox" id="t-ch-${i}"><input type="text" id="t-tx-${i}" placeholder="Task ${i}"></div>`;
    }
